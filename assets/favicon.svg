<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <rect width="64" height="64" fill="#000"/>
    <!-- Six strings -->
    <g stroke="#fff" stroke-linecap="round">
        <line x1="6" y1="14" x2="58" y2="14" stroke-width="1" opacity="0.5"/>
        <line x1="6" y1="22" x2="58" y2="22" stroke-width="1.2" opacity="0.6"/>
        <line x1="6" y1="30" x2="58" y2="30" stroke-width="1.4" opacity="0.7"/>
        <line x1="6" y1="38" x2="58" y2="38" stroke-width="1.6" opacity="0.8"/>
        <line x1="6" y1="46" x2="58" y2="46" stroke-width="1.8" opacity="0.9"/>
        <line x1="6" y1="54" x2="58" y2="54" stroke-width="2" opacity="1"/>
    </g>
    <!-- Frets -->
    <g stroke="#fff" opacity="0.25">
        <line x1="22" y1="8" x2="22" y2="60" stroke-width="1"/>
        <line x1="38" y1="8" x2="38" y2="60" stroke-width="1"/>
        <line x1="54" y1="8" x2="54" y2="60" stroke-width="1"/>
    </g>
    <!-- Nut -->
