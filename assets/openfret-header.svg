<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a0a0a"/>
            <stop offset="100%" stop-color="#000"/>
        </linearGradient>
    </defs>
    <rect width="800" height="280" fill="url(#bg)"/>

    <!-- Six guitar strings across the page -->
    <g stroke="#fff" stroke-linecap="round" opacity="0.6">
        <line x1="60" y1="60"  x2="740" y2="60"  stroke-width="0.8" opacity="0.45"/>
        <line x1="60" y1="80"  x2="740" y2="80"  stroke-width="1.0" opacity="0.55"/>
        <line x1="60" y1="100" x2="740" y2="100" stroke-width="1.2" opacity="0.65"/>
        <line x1="60" y1="200" x2="740" y2="200" stroke-width="1.4" opacity="0.7"/>
        <line x1="60" y1="220" x2="740" y2="220" stroke-width="1.6" opacity="0.8"/>
        <line x1="60" y1="240" x2="740" y2="240" stroke-width="1.8" opacity="0.9"/>
    </g>

    <!-- Frets (vertical lines) -->
    <g stroke="#fff" stroke-width="1" opacity="0.18">
        <line x1="200" y1="50" x2="200" y2="250"/>
        <line x1="320" y1="50" x2="320" y2="250"/>
        <line x1="440" y1="50" x2="440" y2="250"/>
        <line x1="560" y1="50" x2="560" y2="250"/>
        <line x1="680" y1="50" x2="680" y2="250"/>
    </g>

    <!-- Title -->
    <text x="400" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="64" font-weight="200" letter-spacing="14" text-anchor="middle" fill="#fff">
        OPENFRET
    </text>

    <!-- Tagline -->
    <text x="400" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-size="11" font-weight="300" letter-spacing="6" text-anchor="middle" fill="rgba(255,255,255,0.55)">
        YOUR PERSONAL GUITAR SONGBOOK
    </text>
</svg>
